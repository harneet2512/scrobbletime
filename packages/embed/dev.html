<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrobbleTime — Design Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #eee;
      min-height: 100vh;
    }

    .hero {
      padding: 80px 40px 60px;
      text-align: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.08), transparent 60%);
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 15px;
      color: #666;
      max-width: 500px;
      margin: 0 auto;
    }

    .section { padding: 40px; max-width: 1200px; margin: 0 auto; }
    .section-title {
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 32px;
    }

    .card-wrapper {
      position: relative;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #444;
      margin-bottom: 12px;
    }

    .wide { max-width: 480px; }
    .narrow { max-width: 600px; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      margin: 20px 0;
    }

    /* Light mode preview background */
    .light-bg {
      background: #f5f5f5;
      padding: 28px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>ScrobbleTime</h1>
    <p>Live identity cards for personal websites. All layouts and themes.</p>
  </div>

  <div class="section">
    <div class="section-title">Card Layout — Dark Themes</div>
    <div class="grid">
      <div class="card-wrapper">
        <div class="card-label">Auto (Dark)</div>
        <scrobble-time base-url="/activity.json" layout="card" theme="auto"></scrobble-time>
      </div>
      <div class="card-wrapper">
        <div class="card-label">Professional</div>
        <scrobble-time base-url="/activity.json" layout="card" theme="professional"></scrobble-time>
      </div>
      <div class="card-wrapper">
        <div class="card-label">Playful</div>
        <scrobble-time base-url="/activity.json" layout="card" theme="playful"></scrobble-time>
      </div>
      <div class="card-wrapper">
        <div class="card-label">Minimal</div>
        <scrobble-time base-url="/activity.json" layout="card" theme="minimal"></scrobble-time>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Profile Layout</div>
    <div class="wide">
      <scrobble-time base-url="/activity.json" layout="profile" theme="auto"></scrobble-time>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Signature Layout</div>
    <div class="narrow">
      <scrobble-time base-url="/activity.json" layout="signature" theme="auto"></scrobble-time>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Compact Density</div>
    <div style="max-width: 380px;">
      <scrobble-time base-url="/activity.json" layout="card" theme="auto" density="compact"></scrobble-time>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">States</div>
    <div class="grid">
      <div class="card-wrapper">
        <div class="card-label">Loading (bad URL)</div>
        <scrobble-time base-url="/nonexistent.json" layout="card" theme="auto"></scrobble-time>
      </div>
    </div>
  </div>

  <div style="height: 80px;"></div>

  <script type="module" src="./src/index.ts"></script>
</body>
</html>
